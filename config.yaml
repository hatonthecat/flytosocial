###########################
##### GENERAL CONFIG ######
###########################
application-name: 'flytosocial'

############################
##### DATABASE CONFIG ######
############################
db-type: 'sqlite'
db-address: '/gotosocial/storage/sqlite.db'

###########################
##### ACCOUNTS CONFIG #####
###########################
accounts-registration-open: true
accounts-allow-custom-css: true

########################
##### MEDIA CONFIG #####
########################
media-remote-cache-days: 7
media-emoji-local-max-size: 2048
media-emoji-remote-max-size: 2048

##########################
##### STORAGE CONFIG #####
##########################
storage-backend: 's3'

###########################
##### STATUSES CONFIG #####
###########################
statuses-max-chars: 120
statuses-cw-max-chars: 140
statuses-poll-max-options: 15
statuses-poll-option-max-chars: 140
statuses-media-max-files: 1
